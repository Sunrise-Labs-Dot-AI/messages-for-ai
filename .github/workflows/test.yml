name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same ref —
# keeps PR latency low when someone pushes multiple times.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun-test:
    # macOS runner because the eventual binary is macOS-only (uses
    # bun:sqlite against chat.db + osascript). Tests themselves use
    # in-memory SQLite and don't touch chat.db / Messages.app, so
    # Linux would also work today — but keeping the runner close to
    # the production env catches mac-specific regressions early.
    #
    # Matrix over both MCPs: v0.3.0 moved each into its own subdir
    # (mcps/imessage-drafts, mcps/whatsapp-drafts), each with its own
    # package.json + bun.lock + tests. Each shard installs + type-
    # checks + tests its own subdir. fail-fast off so a regression in
    # one MCP doesn't mask the other's status.
    runs-on: macos-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        mcp:
          - mcps/imessage-drafts
          - mcps/whatsapp-drafts
    name: bun-test (${{ matrix.mcp }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ matrix.mcp }}
        run: bun install --frozen-lockfile

      - name: Type-check
        working-directory: ${{ matrix.mcp }}
        run: bun --bun tsc --noEmit

      - name: Test
        working-directory: ${{ matrix.mcp }}
        run: bun test

  swift-build:
    # Verify the companion menu bar app at menubar/ still compiles.
    # We don't run the bundle (no UI in CI) — just `swift build`.
    runs-on: macos-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Swift build
        working-directory: menubar
        run: swift build -c release
