<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Texting Wrapped Story Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #f7f7f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 0%, #5527ff 0, transparent 28rem),
        radial-gradient(circle at 80% 100%, #ff3a91 0, transparent 30rem),
        #050505;
    }

    main {
      width: min(430px, 100vw);
      padding: 18px;
    }

    .viewer {
      position: relative;
      aspect-ratio: 9 / 16;
      width: 100%;
      overflow: hidden;
      border-radius: 28px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
      background: #111;
    }

    .viewer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
    }

    .tap {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .tap button {
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .treatments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
    }

    button.active {
      background: #b7ff1a;
      color: #0b0b0b;
      border-color: #b7ff1a;
    }
  </style>
</head>
<body>
  <main>
    <div class="treatments" aria-label="Treatments">
      <button class="active" data-treatment="neon-orbit">Neon</button>
      <button data-treatment="liquid-pop">Liquid</button>
      <button data-treatment="blacklight-royalty">Royalty</button>
    </div>

    <section class="viewer" aria-label="Story card viewer">
      <img id="card" src="mock-cards/neon-orbit/01-cover.png" alt="Texting Wrapped story card">
      <div class="tap" aria-hidden="true">
        <button id="prev" tabindex="-1"></button>
        <button id="next" tabindex="-1"></button>
      </div>
    </section>

    <div class="controls">
      <button id="share">Share</button>
      <button id="replay">Replay from beginning</button>
    </div>
  </main>

  <script>
    const files = [
      "01-cover.png",
      "02-hero.png",
      "03-people.png",
      "04-reply.png",
      "05-ball.png",
      "06-group.png",
      "07-share.png"
    ];
    let treatment = "neon-orbit";
    let index = 0;
    const img = document.querySelector("#card");

    function render() {
      img.src = `mock-cards/${treatment}/${files[index]}`;
    }

    document.querySelector("#next").addEventListener("click", () => {
      index = Math.min(files.length - 1, index + 1);
      render();
    });

    document.querySelector("#prev").addEventListener("click", () => {
      index = Math.max(0, index - 1);
      render();
    });

    document.querySelector("#replay").addEventListener("click", () => {
      index = 0;
      render();
    });

    document.querySelector("#share").addEventListener("click", async () => {
      const text = "Run your Texting Wrapped at messagesfor.ai";
      if (navigator.share) {
        await navigator.share({ text, url: "https://messagesfor.ai" });
      } else {
        await navigator.clipboard.writeText("https://messagesfor.ai");
        document.querySelector("#share").textContent = "Link copied";
      }
    });

    document.querySelectorAll("[data-treatment]").forEach((button) => {
      button.addEventListener("click", () => {
        treatment = button.dataset.treatment;
        index = 0;
        document.querySelectorAll("[data-treatment]").forEach((b) => b.classList.toggle("active", b === button));
        render();
      });
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") document.querySelector("#next").click();
      if (event.key === "ArrowLeft") document.querySelector("#prev").click();
    });
  </script>
</body>
</html>
